apiVersion: v1
kind: ConfigMap
metadata:
  name: baseball-dash-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }} # Best practice: dynamic namespace tracking
data:
  USER_NAME: {{ .Values.userName | quote }}
  THEME_COLOR: {{ .Values.themeColor | quote }}
  SYNC_INTERVAL_MINS: {{ .Values.syncIntervalMins | quote }}