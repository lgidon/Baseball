apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: baseball-dash-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }} # Best practice: dynamic namespace tracking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: baseball-dash-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75